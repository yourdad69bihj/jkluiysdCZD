<!DOCTYPE html>
<html>
<head>
    <title>SUBWAY ELITE MOD</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 40px; }
        .mod-box { border: 2px solid #ffcc00; padding: 25px; border-radius: 15px; display: inline-block; }
        h1 { color: #ffcc00; letter-spacing: 2px; }
        .stat { font-size: 26px; color: #0f0; margin: 15px 0; font-weight: bold; }
        button { background: #ffcc00; color: #000; border: none; padding: 15px 35px; font-weight: 900; cursor: pointer; border-radius: 8px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="mod-box">
        <h1>SUBWAY SURF MOD</h1>
        <div class="stat">COINS: 900,000</div>
        <div class="stat">KEYS: 900,000</div>
        <button onclick="applyMod()">Apply 900K Mod</button>
    </div>
    <script>
        function applyMod() {
            // These lines simulate injecting values into local storage
            localStorage.setItem('subway_surfers_coins', '900000');
            localStorage.setItem('subway_surfers_keys', '900000');
            alert("900,000 Coins & Keys Applied!");
        }
    </script>
</body>
</html>
